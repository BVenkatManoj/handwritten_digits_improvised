<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognizer Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f5f7fb; 
            color: #333;
            padding-top: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.05);
        }
        #canvas { 
            border: 4px solid #2c3e50; 
            background-color: black; 
            cursor: crosshair; 
            border-radius: 8px;
        }
        .controls { margin-top: 15px; }
        button { 
            padding: 10px 20px; font-size: 15px; cursor: pointer; margin: 5px; 
            border-radius: 6px; border: 1px solid #ddd; background-color: #fff;
            transition: all 0.2s; font-weight: 500;
        }
        button:hover { background-color: #f0f0f0; border-color: #bbb; }
        .btn-predict { background-color: #2ecc71; color: white; border: none; }
        .btn-predict:hover { background-color: #27ae60; }
        
        #result-container { margin-top: 20px; display: none; }
        #main-prediction { font-size: 32px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        
        /* Probability Bars styling */
        .prob-box { width: 80%; margin: 10px auto; text-align: left; }
        .prob-row { display: flex; align-items: center; margin-bottom: 5px; }
        .prob-label { width: 60px; font-weight: bold; }
        .bar-container { flex-grow: 1; background-color: #e0e0e0; border-radius: 4px; height: 12px; overflow: hidden; }
        .bar-fill { background-color: #3498db; height: 100%; width: 0%; transition: width 0.4s ease-out; }
        .prob-percent { width: 60px; text-align: right; font-size: 14px; margin-left: 10px; color: #666; }

        /* Feedback styling */
        .feedback-box { margin-top: 20px; padding: 10px; background: #f9f9f9; border-radius: 6px; }
        .btn-yes { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .btn-no { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Handwritten Digit Recognizer Pro</h2>
    <p style="color: #7f8c8d; font-size: 14px;">Draw large, clean, and right in the center!</p>
    
    <canvas id="canvas" width="280" height="280"></canvas>
    
    <div class="controls">
        <button onclick="clearCanvas()">Clear Canvas</button>
        <button class="btn-predict" onclick="predictDigit()">Predict</button>
    </div>

    <div id="result-container">
        <div id="main-prediction">Prediction: -</div>
        
        <div class="prob-box" id="probabilities-wrapper"></div>

        <div class="feedback-box" id="feedback-wrapper">
            <span>Was this prediction accurate?</span><br>
            <button class="btn-yes" onclick="submitFeedback(true)">Yes, it's correct!</button>
            <button class="btn-no" onclick="submitFeedback(false)">No, it missed</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentPrediction = null;

    ctx.lineWidth = 26; 
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'white';

    // Mouse & Touch setups
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

    function startDrawing(event) { drawing = true; draw(event); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }

    function draw(event) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(event.clientX - rect.left, event.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(event.clientX - rect.left, event.clientY - rect.top);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('feedback-wrapper').style.display = 'block';
    }

    function predictDigit() {
        const dataURL = canvas.toDataURL('image/png');
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('main-prediction').innerText = "Analyzing ink...";
        document.getElementById('probabilities-wrapper').innerHTML = "";

        fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
        })
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                document.getElementById('main-prediction').innerText = "Error: " + data.error;
                return;
            }

            currentPrediction = data.prediction;
            document.getElementById('main-prediction').innerText = `Prediction: ${data.prediction}`;
            
            // Build dynamic telemetry charts for top 3 probabilities
            let htmlMarkup = "";
            data.top_predictions.forEach(item => {
                htmlMarkup += `
                    <div class="prob-row">
                        <div class="prob-label">Digit ${item.digit}</div>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${item.confidence}%"></div>
                        </div>
                        <div class="prob-percent">${item.confidence}%</div>
                    </div>`;
            });
            document.getElementById('probabilities-wrapper').innerHTML = htmlMarkup;
        });
    }

    // Submit log telemetry info back down to python
    function submitFeedback(isCorrect) {
        let actual = currentPrediction;
        if (!isCorrect) {
            const feedbackInput = prompt("What was the actual digit you drew? (0-9):");
            if (feedbackInput !== null && feedbackInput.trim() !== "") actual = feedbackInput;
        }
        
        fetch('/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correct: isCorrect, actualDigit: actual })
        })
        .then(() => {
            document.getElementById('feedback-wrapper').style.display = 'none';
            alert("Thank you for training the system!");
        });
    }
</script>
</body>
</html>
